<!DOCTYPE html>
<html>

<head>

<title>SensiPro Generator</title>

<style>

body{
background:linear-gradient(135deg,#000000,#0a0a0a);
color:white;
font-family:Arial;
text-align:center;
}

.panel{
width:380px;
margin:auto;
margin-top:100px;
background:#111;
padding:30px;
border-radius:15px;
box-shadow:0 0 25px cyan;
}

h1{
color:cyan;
}

button{
padding:12px;
margin:8px;
width:200px;
border:none;
border-radius:10px;
background:cyan;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00bcd4;
}

.result{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<div class="panel">

<h1>SENSI PRO</h1>

<button onclick="gerar()">Gerar Sensi</button>

<button onclick="packRush()">Pack Rush</button>

<button onclick="packPro()">Pack Pro Player</button>

<button onclick="packLow()">Pack Celular Fraco</button>

<div class="result" id="resultado"></div>

</div>

<script>

function gerar(){

let dpi = Math.floor(Math.random()*400)+400

let geral = Math.floor(dpi/5)+120
let red = Math.floor(dpi/5)+140
let x2 = Math.floor(dpi/6)+130
let x4 = Math.floor(dpi/7)+120
let awm = Math.floor(dpi/8)+90

mostrar(geral,red,x2,x4,awm)

}

function packRush(){
mostrar(160,190,180,150,110)
}

function packPro(){
mostrar(145,175,165,135,95)
}

function packLow(){
mostrar(130,150,140,120,80)
}

function mostrar(g,r,x2,x4,a){

document.getElementById("resultado").innerHTML=

`
Geral: ${g}<br>
Red Dot: ${r}<br>
2x Scope: ${x2}<br>
4x Scope: ${x4}<br>
AWM Scope: ${a}
`

}

</script>

</body>
</html>
